# Stremio Account Manager
#
# IMPORTANT: Create .env file first with JWT_SECRET and ENCRYPTION_KEY
# Generate keys: openssl rand -hex 32

services:
  backend:
    image: ghcr.io/ghostdragon5/stremio-account-manager-backend:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - stremio_data:/app/data
      - stremio_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - stremio_net

  frontend:
    image: ghcr.io/ghostdragon5/stremio-account-manager-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    tmpfs:
      - /var/cache/nginx:mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - stremio_net

networks:
  stremio_net:
    driver: bridge

volumes:
  stremio_data:
  stremio_logs: